name: Deploy Unleash Infrastructure

on:
  push:
    branches: [main]

env:
  TF_VERSION: "1.7.0"

jobs:
  lint-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      - name: Terraform Validate (auth)
        working-directory: auth
        run: terraform init -backend=false && terraform validate
      - name: Terraform Validate (us-east-1)
        working-directory: envs/us-east-1
        run: terraform init -backend=false && terraform validate
      - name: Terraform Validate (eu-west-1)
        working-directory: envs/eu-west-1
        run: terraform init -backend=false && terraform validate

  security-scan:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest
    needs: lint-validate
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Plan auth
        working-directory: auth
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init && terraform plan
      - name: Plan us-east-1
        working-directory: envs/us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init && terraform plan
      - name: Plan eu-west-1
        working-directory: envs/eu-west-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init && terraform plan

  test-placeholder:
    name: Run Tests (post-deploy)
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install requests boto3
      - name: Run test script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python test_script.py
        # Note: requires deployed infra + filled-in variables in test_script.py
